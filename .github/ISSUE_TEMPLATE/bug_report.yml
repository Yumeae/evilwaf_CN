name: Bug 报告
description: 报告可复现的问题
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题摘要
      description: 哪里出了问题？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 复现问题的精确命令/输入。
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本/提交
      placeholder: 例如 main@<sha>
